_schema-version: 3.3.0
ID: CAP_01
description: A simple CAP project.
version: 1.0.0
modules:
  - name: CAP_01-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: CAP_01-db
      - name: CAP_01-auth
      - name: CAP_01-destination-service
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    parameters:
      buildpack: nodejs_buildpack
      instances: 1
    build-parameters:
      builder: npm-ci
  - name: CAP_01-db-deployer
    type: hdb
    path: gen/db
    requires:
      - name: CAP_01-db
    parameters:
      buildpack: nodejs_buildpack
  - name: CAP_01-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: CAP_01-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - artifacts:
            - bookshop.zip
          name: bookshop
          target-path: resources/
        - artifacts:
            - customviewbookshop.zip
          name: customviewbookshop
          target-path: resources/
  - name: bookshop
    type: html5
    path: app/bookshop
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: customviewbookshop
    type: html5
    path: app/custom_view_bookshop
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: CAP_01
    type: approuter.nodejs
    path: app/router
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api # must be used in xs-app.json as well
          url: ~{srv-url}
          forwardAuthToken: true
      - name: CAP_01-auth
      - name: CAP_01-destination-service
      - name: CAP_01-html5-runtime
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}

  - name: CAP_01-app-deployer
    type: com.sap.application.content
    path: gen
    build-parameters:
      build-result: app/
      requires:
        - name: CAP_01bookshop
          artifacts:
            - bookshop.zip
          target-path: app/
        - name: CAP_01custom_view_bookshop
          artifacts:
            - custom_view_bookshop.zip
          target-path: app/
        - name: bookshop
        - name: customviewbookshop
    requires:
      - name: CAP_01-auth
      - name: srv-api
      - name: CAP_01-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
      - name: CAP_01-repo-host
    parameters:
      config:
        destinations:
          - Name: srv-api
            URL: ~{srv-api/srv-url}
            Authentication: NoAuthentication
            Type: HTTP
            ProxyType: Internet
            HTML5.ForwardAuthToken: true
            HTML5.DynamicDestination: true

  - name: CAP_01-destinations
    type: com.sap.application.content
    requires:
      - name: CAP_01-auth
        parameters:
          service-key:
            name: CAP_01-auth-key
      - name: CAP_01-repo-host
        parameters:
          service-key:
            name: CAP_01-html5-repo-host-key
      - name: srv-api
      - name: CAP_01-destination-service
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: CAP_01-html5-repository
              ServiceInstanceName: CAP_01-html5-repo-host
              ServiceKeyName: CAP_01-html5-repo-host-key
              sap.cloud.service: CAP_01.service
            - Name: CAP_01-auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: CAP_01-auth
              ServiceKeyName: CAP_01-auth-key
              sap.cloud.service: CAP_01.service
resources:
  - name: CAP_01-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: CAP_01-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-name: CAP_01-html5-service
      service-plan: app-host
  - name: CAP_01-destination-service
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        HTML5Runtime_enabled: false
        init_data:
          instance:
            destinations:
              - Authentication: NoAuthentication
                Name: ui5
                ProxyType: Internet
                Type: HTTP
                URL: https://ui5.sap.com
            existing_destinations_policy: update
        version: 1.0.0
      service: destination
      service-name: CAP_01-destination-service
      service-plan: lite
    requires:
      - name: srv-api
  - name: CAP_01-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: CAP_01-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
          redirect-uris:
            - https://*~{app-api/app-uri}/**
    requires:
      - name: app-api
  - name: CAP_01-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
